<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Vendas IVAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-logo-section">
                    <img src="https://i.ibb.co/6cpX4gQQ/LOGO-IVAN-PNG.png" alt="Logo IVAN" class="company-logo">
                    <div class="header-text">
                        <h1 class="company-name">RANKING DE VENDAS IVAN</h1>
                        <p class="dashboard-title">Ranking de Vendas - VGV</p>
                    </div>
                </div>
                <p id="lastUpdated" class="last-updated">Última atualização: agora</p>
            </div>
            <div class="header-divider"></div>
        </header>

        <main class="dashboard-main">
            <div id="rankingContainer" class="ranking-container">
                <div class="loading">Carregando dados...</div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>

</html>
