<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Imobiliária - Sales Performance Ranking</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header Section -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="company-info">
                    <h1 class="company-name">PREMIUM IMOBILIÁRIA</h1>
                    <h2 class="dashboard-title">Sales Performance Ranking</h2>
                </div>
                <div class="last-updated">
                    <span id="lastUpdated">Última atualização: agora</span>
                </div>
            </div>
            <div class="header-divider"></div>
        </header>

        <!-- Main Content -->
        <main class="dashboard-main">
            <div class="ranking-container" id="rankingContainer">
                <!-- Team cards will be dynamically inserted here -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
